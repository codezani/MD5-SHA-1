<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Hash Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 540px;
      padding: 15px;
      background: #f9f9f9;
    }
    h2 { 
      text-align: center; 
      margin-top: 0; 
      color: #333;
    }
    textarea {
      width: 100%;
      height: 130px;
      font-size: 15px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
    }
    .result {
      margin: 15px 0;
      padding: 18px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: monospace;
      word-break: break-all;
      line-height: 1.8;
      min-height: 380px;     /* اندازه یکسان برای هر دو کادر */
      box-sizing: border-box;
    }
    .result h3 {
      margin: 0 0 16px 0;
      color: #0066cc;
      font-size: 17px;
    }
    .hash-text {
      font-size: 16.5px;     /* فونت بزرگ‌تر */
      margin: 8px 0 12px 0;
      display: block;
      color: #222;
    }
    #status {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h2>🔐 Text Hash Generator</h2>
  <textarea id="input" placeholder="Enter your text here..."></textarea>
  
  <div id="results"></div>
  <div id="status"></div>

  <script src="md5.js"></script>
  <script src="popup.js"></script>
</body>
</html>
